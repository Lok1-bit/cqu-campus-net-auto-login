name: Bug report
description: 报告可复现的错误；请先删除所有敏感信息
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿上传账号、密码、完整 IP/MAC、原始门户 URL、未脱敏日志或截图。安全漏洞请通过 Security Advisory 私下报告。

  - type: input
    id: version
    attributes:
      label: 版本或提交
      description: 例如 v0.1.0 或提交哈希
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows 版本
      options:
        - Windows 11
        - Windows 10
        - 其他
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 使用虚构账号和文档保留地址描述操作
      placeholder: |
        1. 运行……
        2. 等待……
        3. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为与脱敏日志
      description: 只粘贴最少且已脱敏的内容
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已删除账号、密码、IP/MAC、门户 URL，以及未经脱敏的日志和截图。
          required: true
        - label: 这不是需要私下报告的安全漏洞。
          required: true
