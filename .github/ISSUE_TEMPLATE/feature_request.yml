name: Feature request
description: 建议一个聚焦、可维护的新功能
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        请描述问题和使用场景，不要包含账号、密码、IP/MAC、原始门户 URL 或未脱敏资料。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 说明当前行为为什么不足
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望行为，以及对安全性和资源占用的影响
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 本建议不包含账号、密码、IP/MAC、门户 URL或未经脱敏的诊断资料。
          required: true
