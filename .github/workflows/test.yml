name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: powershell
        run: |
          $files = Get-ChildItem -Path . -Recurse -File | Where-Object { $_.Extension -in '.ps1', '.psm1', '.psd1' }
          $allErrors = @()
          foreach ($file in $files) {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
              foreach ($error in $errors) {
                  $allErrors += "${file}: $($error.Message)"
              }
          }
          if ($allErrors.Count -gt 0) {
              $allErrors | ForEach-Object { Write-Error $_ }
              throw "$($allErrors.Count) PowerShell syntax error(s) found."
          }

      - name: Install deterministic Pester version
        shell: powershell
        run: |
          Install-Module Pester -RequiredVersion 4.10.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run offline Pester tests
        shell: powershell
        run: |
          Import-Module Pester -RequiredVersion 4.10.1 -Force
          $result = Invoke-Pester -Path '.\tests\CquCampusNet.Tests.ps1' -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed."
          }
